<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小教 教师审核门</title>
  <style>
:root {
  color-scheme: light;
  --ink: #1f2933;
  --muted: #607080;
  --line: #d6dee6;
  --soft: #f5f7fa;
  --panel: #ffffff;
  --accent: #256f7f;
  --accent-2: #8a5a14;
  --ok: #24704a;
  --warn: #9a5b00;
  --danger: #9d3434;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
  background: #eef3f5;
  color: var(--ink);
}
.shell {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
}
.topbar {
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: #ffffff;
  border-bottom: 1px solid var(--line);
}
.brand {
  display: flex;
  align-items: baseline;
  gap: 12px;
}
.brand strong { font-size: 20px; }
.brand span, .meta { color: var(--muted); font-size: 14px; }
.main {
  width: min(1120px, calc(100vw - 40px));
  margin: 0 auto;
  padding: 28px 0 40px;
}
.surface {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 28px;
}
.light-hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 300px;
  gap: 28px;
  align-items: start;
}
h1, h2, h3 { margin: 0; letter-spacing: 0; }
h1 { font-size: 28px; line-height: 1.2; }
h2 { font-size: 22px; line-height: 1.25; }
h3 { font-size: 17px; line-height: 1.35; }
p { margin: 0; line-height: 1.65; }
.muted { color: var(--muted); }
.focus-title { margin-top: 10px; font-size: 34px; line-height: 1.2; }
.summary-strip {
  margin-top: 24px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
}
.summary-strip div {
  padding: 16px;
  background: #fbfcfd;
  border-right: 1px solid var(--line);
}
.summary-strip div:last-child { border-right: 0; }
.summary-strip b { display: block; font-size: 22px; margin-bottom: 4px; }
.agent-note {
  border-left: 4px solid var(--accent);
  background: #eef7f8;
  padding: 14px 16px;
  border-radius: 6px;
  line-height: 1.6;
}
.actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }
button {
  appearance: none;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 15px;
  cursor: default;
}
button.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
button.warning {
  border-color: #ddb36f;
  background: #fff8ed;
  color: #663d00;
}
.lesson-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 300px;
  gap: 22px;
  align-items: start;
}
.section {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px;
  background: #fff;
  margin-top: 14px;
}
.section.problem {
  border-color: #ddb36f;
  background: #fffaf2;
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.pill {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  padding: 3px 9px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #f7f9fb;
  color: var(--muted);
  font-size: 13px;
  white-space: nowrap;
}
.pill.warn { border-color: #ddb36f; color: #7a4a00; background: #fff6e7; }
.side-list {
  display: grid;
  gap: 12px;
}
.object-row {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px;
  background: #fbfcfd;
}
.object-row b { display: block; margin-bottom: 5px; }
.attached {
  margin-top: 12px;
  margin-left: 18px;
  max-width: 560px;
}
.patch-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  gap: 22px;
}
.preview-doc {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  overflow: hidden;
}
.preview-doc header {
  padding: 18px;
  border-bottom: 1px solid var(--line);
  background: #f7fafb;
}
.preview-doc .doc-body { padding: 18px; display: grid; gap: 14px; }
.task {
  padding: 14px;
  background: #fbfcfd;
  border: 1px solid var(--line);
  border-radius: 8px;
}
.review-banner {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  align-items: center;
  border: 1px solid #e6bd72;
  background: #fff8ea;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 18px;
}
.kv {
  display: grid;
  grid-template-columns: 180px minmax(0, 1fr);
  border-top: 1px solid var(--line);
}
.kv div {
  padding: 12px;
  border-bottom: 1px solid var(--line);
}
.kv div:nth-child(odd) {
  color: var(--muted);
  background: #f8fafb;
}
@media (max-width: 780px) {
  .topbar { padding: 0 16px; }
  .main { width: min(100vw - 24px, 1120px); padding-top: 16px; }
  .surface { padding: 18px; }
  .light-hero, .lesson-grid, .patch-layout { grid-template-columns: 1fr; }
  .summary-strip { grid-template-columns: 1fr; }
  .summary-strip div { border-right: 0; border-bottom: 1px solid var(--line); }
  .summary-strip div:last-child { border-bottom: 0; }
}
</style>
</head>
<body>

<div class="shell">
  <header class="topbar">
    <div class="brand"><strong>小教</strong><span>教师审核</span></div>
    <div class="meta">候选内容不会自动通过</div>
  </header>
  <main class="main">
    <section class="surface">
      <div class="review-banner">
        <div><strong>小教已经把学习单候选放到审核区。</strong><p class="muted">系统不能替老师做最终专业判断。</p></div>
        <span class="pill warn">需要确认</span>
      </div>
      <div class="kv">
        <div>patch_id</div><div>patch_handout_L004_001</div>
        <div>target_work_object</div><div>art_handout</div>
        <div>patch_type</div><div>create_handout_candidate</div>
        <div>applied</div><div>false</div>
        <div>rollback_available</div><div>true</div>
        <div>teacher_review_required</div><div>true</div>
      </div>
      <div class="actions">
        <button class="primary">确认采用</button>
        <button>修改后采用</button>
        <button>暂存</button>
        <button>放弃</button>
        <button>重新生成候选</button>
      </div>
    </section>
  </main>
</div>

</body>
</html>
