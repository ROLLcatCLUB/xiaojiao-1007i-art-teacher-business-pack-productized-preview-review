<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小教 学习单候选预览</title>
  <style>
:root {
  color-scheme: light;
  --ink: #1f2933;
  --muted: #607080;
  --line: #d6dee6;
  --soft: #f5f7fa;
  --panel: #ffffff;
  --accent: #256f7f;
  --accent-2: #8a5a14;
  --ok: #24704a;
  --warn: #9a5b00;
  --danger: #9d3434;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
  background: #eef3f5;
  color: var(--ink);
}
.shell {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
}
.topbar {
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: #ffffff;
  border-bottom: 1px solid var(--line);
}
.brand {
  display: flex;
  align-items: baseline;
  gap: 12px;
}
.brand strong { font-size: 20px; }
.brand span, .meta { color: var(--muted); font-size: 14px; }
.main {
  width: min(1120px, calc(100vw - 40px));
  margin: 0 auto;
  padding: 28px 0 40px;
}
.surface {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 28px;
}
.light-hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 300px;
  gap: 28px;
  align-items: start;
}
h1, h2, h3 { margin: 0; letter-spacing: 0; }
h1 { font-size: 28px; line-height: 1.2; }
h2 { font-size: 22px; line-height: 1.25; }
h3 { font-size: 17px; line-height: 1.35; }
p { margin: 0; line-height: 1.65; }
.muted { color: var(--muted); }
.focus-title { margin-top: 10px; font-size: 34px; line-height: 1.2; }
.summary-strip {
  margin-top: 24px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
}
.summary-strip div {
  padding: 16px;
  background: #fbfcfd;
  border-right: 1px solid var(--line);
}
.summary-strip div:last-child { border-right: 0; }
.summary-strip b { display: block; font-size: 22px; margin-bottom: 4px; }
.agent-note {
  border-left: 4px solid var(--accent);
  background: #eef7f8;
  padding: 14px 16px;
  border-radius: 6px;
  line-height: 1.6;
}
.actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }
button {
  appearance: none;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 15px;
  cursor: default;
}
button.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
button.warning {
  border-color: #ddb36f;
  background: #fff8ed;
  color: #663d00;
}
.lesson-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 300px;
  gap: 22px;
  align-items: start;
}
.section {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px;
  background: #fff;
  margin-top: 14px;
}
.section.problem {
  border-color: #ddb36f;
  background: #fffaf2;
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.pill {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  padding: 3px 9px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: #f7f9fb;
  color: var(--muted);
  font-size: 13px;
  white-space: nowrap;
}
.pill.warn { border-color: #ddb36f; color: #7a4a00; background: #fff6e7; }
.side-list {
  display: grid;
  gap: 12px;
}
.object-row {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px;
  background: #fbfcfd;
}
.object-row b { display: block; margin-bottom: 5px; }
.attached {
  margin-top: 12px;
  margin-left: 18px;
  max-width: 560px;
}
.patch-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  gap: 22px;
}
.preview-doc {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  overflow: hidden;
}
.preview-doc header {
  padding: 18px;
  border-bottom: 1px solid var(--line);
  background: #f7fafb;
}
.preview-doc .doc-body { padding: 18px; display: grid; gap: 14px; }
.task {
  padding: 14px;
  background: #fbfcfd;
  border: 1px solid var(--line);
  border-radius: 8px;
}
.review-banner {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  align-items: center;
  border: 1px solid #e6bd72;
  background: #fff8ea;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 18px;
}
.kv {
  display: grid;
  grid-template-columns: 180px minmax(0, 1fr);
  border-top: 1px solid var(--line);
}
.kv div {
  padding: 12px;
  border-bottom: 1px solid var(--line);
}
.kv div:nth-child(odd) {
  color: var(--muted);
  background: #f8fafb;
}
@media (max-width: 780px) {
  .topbar { padding: 0 16px; }
  .main { width: min(100vw - 24px, 1120px); padding-top: 16px; }
  .surface { padding: 18px; }
  .light-hero, .lesson-grid, .patch-layout { grid-template-columns: 1fr; }
  .summary-strip { grid-template-columns: 1fr; }
  .summary-strip div { border-right: 0; border-bottom: 1px solid var(--line); }
  .summary-strip div:last-child { border-bottom: 0; }
}
</style>
</head>
<body>

<div class="shell">
  <header class="topbar">
    <div class="brand"><strong>小教</strong><span>学习单候选</span></div>
    <div class="meta">等待张老师审核</div>
  </header>
  <main class="main">
    <div class="review-banner">
      <div><strong>这是候选内容，还不是正式学习单。</strong><p class="muted">确认前不会写入正式材料。</p></div>
      <span class="pill warn">待教师审核</span>
    </div>
    <section class="patch-layout">
      <article class="preview-doc">
        <header><h1>《色彩的感觉》学习单候选</h1><p class="muted">四年级 · 课堂练习型 · 难度正常</p></header>
        <div class="doc-body">
          <div class="task"><h3>学习目标</h3><p>我能观察色彩带来的情绪感受，并说出自己使用某种色彩的理由。</p></div>
          <div class="task"><h3>学生任务</h3><p>选择一种情绪，用 3 组颜色做小样，再圈出最能表达这种情绪的一组。</p></div>
          <div class="task"><h3>自查问题</h3><p>我的颜色选择和想表达的感受一致吗？我能说出一种颜色变化带来的不同感觉吗？</p></div>
        </div>
      </article>
      <aside class="surface side-list">
        <div class="object-row"><b>来源</b><span class="muted">来自《色彩的感觉》课时目标、当前课时结构、四年级学情 stub。</span></div>
        <div class="object-row"><b>状态</b><span class="muted">等待教师审核 · 不会自动采用</span></div>
        <div class="actions">
          <button class="primary">采用</button>
          <button>修改</button>
          <button>不采用</button>
          <button>重新生成候选</button>
        </div>
      </aside>
    </section>
  </main>
</div>

</body>
</html>
